[workspace]
authors = ["junjie zhang <junj.jay.zhang@gmail.com>"]
channels = ["conda-forge"]
name = "memviz-neo"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = ">=3.11"
polars = "*"
pyarrow = "*"
fastapi = "*"
uvicorn = "*"
click = "*"
nodejs = ">=20"
pnpm = "*"

[pypi-dependencies]
memviz-neo = { path = ".", editable = true }

[feature.dev.dependencies]
pytest = "*"
ruff = "*"

[environments]
default = { features = ["dev"] }

[tasks]
serve = "python -m memviz_neo.cli serve"
dev = "python -m memviz_neo.cli dev"
build-web = "pnpm --dir web build"
test = "pytest tests/"
lint = "ruff check src/"
